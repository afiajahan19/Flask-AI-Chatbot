<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chatbot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">🤖 ChatBot Assistant</div>

    <div class="chat-window" id="chat-window">
      <div class="bot-message">Hello! I'm here to assist you. How shall I assist you today?</div>
    </div>

    <div class="chat-input-box">
      <input type="text" id="user-input" placeholder="Ask me anything..." autocomplete="off" />
      <button onclick="sendMessage()">Send</button>
    </div>

    <div class="chat-actions">
      <button onclick="exportChat()">📁 Export Chat</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
